<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проверка за 7 дней</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:#fff;
}

.app {
  max-width:420px;
  margin:auto;
  padding:16px;
}

h1 {
  text-align:center;
}

.block {
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.item {
  margin-bottom:10px;
}

label {
  font-size:13px;
  display:block;
  margin-bottom:4px;
}

input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

.copy {
  background:#22c55e;
}

.reset {
  background:#ef4444;
  color:#fff;
}
</style>
</head>
<body>

<div class="app">
  <h1>📊 Проверка за 7 дней</h1>

  <div id="list"></div>

  <button class="copy" onclick="copyReport()">Скопировать отчет</button>
  <button class="reset" onclick="resetAll()">Сбросить</button>
</div>

<script>
const QUESTIONS = [
  "Сколько заказов было всего сделано за 7 дней",
  "Сколько продаж было за 7 дней",
  "Сколько заказов по сотрудникам за 7 дней",
  "Совпадают ли фактические суммы с программой",
  "Доход сотрудников за 7 дней",
  "Товары и услуги по сотрудникам",
  "Общая прибыль сервиса за 7 дней",
  "Чистый остаток по заказам и товарам",
  "Просрочки за 7 дней"
];

function load() {
  return JSON.parse(localStorage.getItem("report7")) || {};
}

function save(data) {
  localStorage.setItem("report7", JSON.stringify(data));
}

function render() {
  const data = load();
  const list = document.getElementById("list");
  list.innerHTML = "";

  QUESTIONS.forEach((q, i) => {
    const value = data[i] || "";

    list.innerHTML += `
      <div class="block">
        <div class="item">
          <label>${i+1}. ${q}</label>
          <input value="${value}" oninput="update(${i}, this.value)">
        </div>
      </div>
    `;
  });
}

function update(i, val) {
  const data = load();
  data[i] = val;
  save(data);
}

function copyReport() {
  const data = load();

  let text = "📊 Проверка за 7 дней\n\n";

  QUESTIONS.forEach((q, i) => {
    text += (i+1) + ". " + q + ":\n" + (data[i] || "-") + "\n\n";
  });

  navigator.clipboard.writeText(text);
  alert("Скопировано");
}

function resetAll() {
  localStorage.removeItem("report7");
  render();
}

render();
</script>

</body>
</html>
