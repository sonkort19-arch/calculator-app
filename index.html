<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Наставник / Трекер дисциплины</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card-2: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: #334155;
      --accent: #22c55e;
      --accent-2: #16a34a;
      --danger: #ef4444;
      --warn: #f59e0b;
      --shadow: 0 12px 32px rgba(0,0,0,.28);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      max-width: 820px;
      margin: 0 auto;
    }

    .card {
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.2;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 18px;
    }

    .progress {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .progress-bar {
      flex: 1;
      height: 10px;
      border-radius: 999px;
      background: #0b1220;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #4ade80);
      transition: width .25s ease;
    }

    .question {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 14px;
    }

    .hint {
      color: var(--muted);
      margin-bottom: 12px;
      font-size: 14px;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: #04130a;
    }

    .btn-secondary {
      background: #1e293b;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-danger {
      background: #3f1d1d;
      color: #fecaca;
      border: 1px solid #7f1d1d;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .error {
      color: #fecaca;
      background: rgba(127, 29, 29, 0.25);
      border: 1px solid #7f1d1d;
      border-radius: 12px;
      padding: 10px 12px;
      margin-top: 12px;
      display: none;
    }

    .result {
      white-space: pre-wrap;
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      line-height: 1.6;
      font-size: 15px;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .mini {
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .mini .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .mini .value {
      font-size: 20px;
      font-weight: 700;
    }

    @media (max-width: 700px) {
      .question { font-size: 20px; }
      .mini-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>Персональный наставник</h1>
      <div class="sub">
        План / факт, очки, уровень, недельная цель и контроль перегруза.
      </div>

      <div class="progress">
        <span id="progressText">Вопрос 1 из 10</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="question" id="questionText"></div>
      <div class="hint" id="questionHint"></div>

      <textarea id="answerInput" placeholder="Напиши ответ..."></textarea>

      <div class="actions">
        <button class="btn-primary" id="nextBtn">Далее</button>
        <button class="btn-secondary" id="backBtn">Назад</button>
        <button class="btn-danger" id="resetBtn">Начать заново</button>
      </div>

      <div class="error" id="errorBox"></div>
    </div>

    <div class="card">
      <div class="mini-grid">
        <div class="mini">
          <div class="label">Общие очки</div>
          <div class="value" id="totalPointsValue">0</div>
        </div>
        <div class="mini">
          <div class="label">Уровень</div>
          <div class="value" id="levelValue">Новичок</div>
        </div>
        <div class="mini">
          <div class="label">Сегодня</div>
          <div class="value" id="dateValue">—</div>
        </div>
      </div>
    </div>

    <div class="card" id="resultCard" style="display:none;">
      <h2 style="margin-top:0;">Готовый текст</h2>
      <div class="result" id="resultText"></div>

      <div class="actions">
        <button class="btn-primary" id="copyBtn">Скопировать</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "mentor_tracker_v1";

    const QUESTIONS = [
      {
        key: "doneYesterday",
        text: "Вопрос 1: Что ты сделал вчера?",
        hint: "Кратко списком. Например: программировал, звонил клиенту, гулял."
      },
      {
        key: "plannedYesterday",
        text: "Вопрос 2: Что ты планировал вчера?",
        hint: "Напиши, что было в плане."
      },
      {
        key: "notDone",
        text: "Вопрос 3: Что ты не сделал?",
        hint: "Если всё сделал или был выходной — так и напиши."
      },
      {
        key: "whyNotDone",
        text: "Вопрос 4: Почему не сделал?",
        hint: "Например: выходной, устал, прокрастинация, не было плана."
      },
      {
        key: "energy",
        text: "Вопрос 5: Энергия сейчас (1–10)?",
        hint: "Напиши число от 1 до 10."
      },
      {
        key: "overload",
        text: "Вопрос 6: Есть ли перегруз?",
        hint: "Напиши: да / нет."
      },
      {
        key: "weekGoal",
        text: "Вопрос 7: Главная цель на неделю?",
        hint: "Например: восстановить режим, доделать модуль CRM."
      },
      {
        key: "businessTasks",
        text: "Вопрос 8: 2 бизнес-задачи на неделю?",
        hint: "Напиши две задачи через запятую или по строкам."
      },
      {
        key: "sportHealth",
        text: "Вопрос 9: Спорт / здоровье — что будешь делать?",
        hint: "Например: прогулка, тренировка, сон до 23:00."
      },
      {
        key: "financialGoal",
        text: "Вопрос 10: Финансовая цель на неделю?",
        hint: "Например: 5000 ₽, 10000 ₽."
      }
    ];

    const els = {
      questionText: document.getElementById("questionText"),
      questionHint: document.getElementById("questionHint"),
      answerInput: document.getElementById("answerInput"),
      nextBtn: document.getElementById("nextBtn"),
      backBtn: document.getElementById("backBtn"),
      resetBtn: document.getElementById("resetBtn"),
      errorBox: document.getElementById("errorBox"),
      progressText: document.getElementById("progressText"),
      progressFill: document.getElementById("progressFill"),
      resultCard: document.getElementById("resultCard"),
      resultText: document.getElementById("resultText"),
      copyBtn: document.getElementById("copyBtn"),
      totalPointsValue: document.getElementById("totalPointsValue"),
      levelValue: document.getElementById("levelValue"),
      dateValue: document.getElementById("dateValue")
    };

    function getTodayDate() {
      const d = new Date();
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const yyyy = d.getFullYear();
      return `${dd}.${mm}.${yyyy}`;
    }

    function getTomorrowDate() {
      const d = new Date();
      d.setDate(d.getDate() + 1);
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const yyyy = d.getFullYear();
      return `${dd}.${mm}.${yyyy}`;
    }

    function getDefaultState() {
      return {
        date: getTodayDate(),
        currentQuestionIndex: 0,
        totalPoints: 0,
        history: [],
        answers: {
          doneYesterday: "",
          plannedYesterday: "",
          notDone: "",
          whyNotDone: "",
          energy: "",
          overload: "",
          weekGoal: "",
          businessTasks: "",
          sportHealth: "",
          financialGoal: ""
        },
        report: ""
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return getDefaultState();

        const parsed = JSON.parse(raw);
        const fallback = getDefaultState();

        return {
          ...fallback,
          ...parsed,
          answers: {
            ...fallback.answers,
            ...(parsed.answers || {})
          }
        };
      } catch {
        return getDefaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    let state = loadState();

    function showError(message) {
      els.errorBox.style.display = "block";
      els.errorBox.textContent = message;
    }

    function hideError() {
      els.errorBox.style.display = "none";
      els.errorBox.textContent = "";
    }

    function isMeaningfulText(value) {
      return value && value.trim().length > 0;
    }

    function normalizeText(value) {
      return (value || "").trim();
    }

    function normalizeLower(value) {
      return normalizeText(value).toLowerCase();
    }

    function isYes(value) {
      const v = normalizeLower(value);
      return ["да", "yes", "y", "есть"].includes(v);
    }

    function isNo(value) {
      const v = normalizeLower(value);
      return ["нет", "no", "n"].includes(v);
    }

    function looksLikeNoMiss(value) {
      const v = normalizeLower(value);
      return [
        "нет",
        "нечего",
        "ничего",
        "ничего не осталось",
        "всё сделал",
        "все сделал",
        "выходной",
        "-"
      ].includes(v);
    }

    function parseEnergy(value) {
      const num = Number(String(value).replace(",", ".").trim());
      if (Number.isNaN(num)) return null;
      return num;
    }

    function getLevel(total) {
      if (total >= 500) return "Машина";
      if (total >= 300) return "Сильный";
      if (total >= 150) return "Рост";
      if (total >= 50) return "Стабильность";
      return "Новичок";
    }

    function splitTasks(text) {
      return normalizeText(text)
        .split(/\n|,|;/)
        .map(item => item.trim())
        .filter(Boolean);
    }

    function calculateDayPoints(answers) {
      let points = 0;
      let penalties = 0;
      const reasons = [];

      const doneYesterday = normalizeText(answers.doneYesterday);
      const businessTasks = splitTasks(answers.businessTasks);
      const sportHealth = normalizeText(answers.sportHealth);
      const overload = answers.overload;
      const notDone = answers.notDone;
      const weekGoal = normalizeText(answers.weekGoal);
      const whyNotDone = normalizeLower(answers.whyNotDone);
      const energy = parseEnergy(answers.energy);

      if (isMeaningfulText(doneYesterday)) {
        points += 5;
        reasons.push("+5 — есть факт работы");
      }

      if (isMeaningfulText(weekGoal) && isMeaningfulText(doneYesterday)) {
        points += 10;
        reasons.push("+10 — есть ключевой вектор и факт действия");
      }

      if (businessTasks.length > 0 && businessTasks[0].toLowerCase() !== "не знаю") {
        points += 5;
        reasons.push("+5 — есть действие на деньги");
      } else {
        penalties -= 5;
        reasons.push("-5 — нет задач на деньги");
      }

      if (isMeaningfulText(sportHealth) && normalizeLower(sportHealth) !== "не знаю") {
        points += 5;
        reasons.push("+5 — есть спорт / здоровье");
      }

      if (isMeaningfulText(doneYesterday)) {
        points += 3;
        reasons.push("+3 — дисциплина");
      }

      if (isMeaningfulText(notDone) && !looksLikeNoMiss(notDone)) {
        penalties -= 5;
        reasons.push("-5 — не выполнена часть задач");
      }

      if (whyNotDone.includes("прокраст")) {
        penalties -= 5;
        reasons.push("-5 — прокрастинация");
      }

      if (isYes(overload)) {
        penalties -= 5;
        reasons.push("-5 — перегруз");
      }

      if (energy !== null && energy <= 3 && !isYes(overload)) {
        reasons.push("Низкая энергия: нужен упрощённый план");
      }

      return {
        dayPoints: points + penalties,
        reasons
      };
    }

    function buildPlanTasks(answers) {
      const energy = parseEnergy(answers.energy);
      const overload = isYes(answers.overload);
      const weekGoal = normalizeText(answers.weekGoal) || "удержать дисциплину";
      const sport = normalizeText(answers.sportHealth) || "прогулка";
      const business = splitTasks(answers.businessTasks);
      const financialGoal = normalizeText(answers.financialGoal) || "не указана";

      const isLowEnergy = energy !== null && energy <= 3;
      const lightMode = isLowEnergy || overload;

      if (lightMode) {
        return [
          `🔥 КЛЮЧЕВАЯ: 30–60 минут на главную цель недели — ${weekGoal}`,
          `Сделать 1 простое действие на деньги`,
          `Сделать 1 короткий шаг по бизнес-задаче: ${business[0] || "написать бизнес-задачу"}`,
          `${sport} 20–30 минут`,
          `Отдых без телефона 30 минут`,
          `Лечь спать раньше обычного для восстановления режима`
        ];
      }

      return [
        `🔥 КЛЮЧЕВАЯ: продвинуть цель недели — ${weekGoal}`,
        `Сделать 1 действие на деньги`,
        `Выполнить бизнес-задачу №1: ${business[0] || "определить первую бизнес-задачу"}`,
        `Выполнить бизнес-задачу №2: ${business[1] || "определить вторую бизнес-задачу"}`,
        `${sport}`,
        `30–60 минут дисциплины без отвлечений`,
        `Отдых 30–60 минут без чувства вины`
      ];
    }

    function buildAnalysis(answers) {
      const energy = parseEnergy(answers.energy);
      const overload = isYes(answers.overload);
      const business = splitTasks(answers.businessTasks);
      const notDone = normalizeText(answers.notDone);
      const whyNotDone = normalizeLower(answers.whyNotDone);
      const financialGoal = normalizeText(answers.financialGoal);

      const lines = [];

      if (!business.length || normalizeLower(business.join(" ")) === "не знаю") {
        lines.push("Слабое место — нет ясных бизнес-задач. Без этого день уходит в процесс, а не в деньги.");
      }

      if (!financialGoal || normalizeLower(financialGoal) === "не знаю") {
        lines.push("Финансовая цель не указана. Значит нет конкретного денежного ориентира.");
      }

      if (isMeaningfulText(notDone) && !looksLikeNoMiss(notDone)) {
        lines.push(`Ты слился в точке: ${notDone}. Причина: ${answers.whyNotDone || "не указана"}.`);
      } else {
        lines.push("Явного срыва нет, но нужен чёткий фокус на деньги и режим.");
      }

      if (whyNotDone.includes("прокраст")) {
        lines.push("Есть избегание через прокрастинацию. Значит задачи либо размыты, либо слишком тяжёлые.");
      }

      if (energy !== null && energy <= 3) {
        lines.push("Энергия низкая. Сейчас нельзя грузить себя большим планом — только 1–2 ключевых шага.");
      }

      if (overload) {
        lines.push("Есть перегруз. Значит план надо резать, а не героически терпеть.");
      }

      lines.push("Как усилить: каждый день должен включать 1 действие на деньги, 1 шаг по дисциплине, 1 шаг по здоровью.");
      lines.push("Что даст деньги: клиент, продажа, доработка модуля CRM, который влияет на работу или прибыль.");

      return lines.join("\n");
    }

    function buildReport() {
      const answers = state.answers;
      const today = getTodayDate();
      const tomorrow = getTomorrowDate();

      const calc = calculateDayPoints(answers);
      const projectedTotal = Math.max(0, (state.totalPoints || 0) + calc.dayPoints);
      const level = getLevel(projectedTotal);
      const planTasks = buildPlanTasks(answers);
      const analysis = buildAnalysis(answers);
      const business = splitTasks(answers.businessTasks);
      const sport = normalizeText(answers.sportHealth) || "Не указано";
      const financialGoal = normalizeText(answers.financialGoal) || "Не указано";

      const factLines = splitTasks(answers.doneYesterday);
      const factBlock = factLines.length
        ? factLines.map(item => `- ${item}`).join("\n")
        : `- ${answers.doneYesterday || "Не указано"}`;

      const planBlock = planTasks.map(item => `- ${item}`).join("\n");

      const report =
`➡️ Факт ${today}

${factBlock}

📋 План на ${tomorrow}

${planBlock}

Выводы:

${analysis}

🏆 Очки за день: ${calc.dayPoints > 0 ? "+" + calc.dayPoints : calc.dayPoints}
📊 Общие очки: ${projectedTotal}
🚀 Уровень: ${level}

📆 План на неделю:

Ключевая задача:
- ${normalizeText(answers.weekGoal) || "Не указано"}

2 бизнес задачи:
- ${business[0] || "Не указано"}
- ${business[1] || "Не указано"}

Спортивная задача:
- ${sport}

Финансовая цель:
- ${financialGoal}`;

      return {
        report,
        dayPoints: calc.dayPoints,
        totalPoints: projectedTotal,
        level
      };
    }

    function renderQuestion() {
      const q = QUESTIONS[state.currentQuestionIndex];
      els.questionText.textContent = q.text;
      els.questionHint.textContent = q.hint;
      els.answerInput.value = state.answers[q.key] || "";
      els.progressText.textContent = `Вопрос ${state.currentQuestionIndex + 1} из ${QUESTIONS.length}`;
      els.progressFill.style.width = `${((state.currentQuestionIndex + 1) / QUESTIONS.length) * 100}%`;
      els.backBtn.style.display = state.currentQuestionIndex === 0 ? "none" : "inline-block";
      hideError();
      setTimeout(() => els.answerInput.focus(), 0);
    }

    function renderSummaryPreview() {
      els.totalPointsValue.textContent = state.totalPoints || 0;
      els.levelValue.textContent = getLevel(state.totalPoints || 0);
      els.dateValue.textContent = state.date || getTodayDate();

      if (state.report) {
        els.resultCard.style.display = "block";
        els.resultText.textContent = state.report;
      } else {
        els.resultCard.style.display = "none";
        els.resultText.textContent = "";
      }
    }

    function render() {
      renderQuestion();
      renderSummaryPreview();
    }

    function finalizeFlow() {
      const result = buildReport();
      state.report = result.report;
      state.totalPoints = result.totalPoints;
      state.date = getTodayDate();

      state.history.push({
        date: getTodayDate(),
        answers: { ...state.answers },
        dayPoints: result.dayPoints,
        totalPoints: result.totalPoints,
        level: result.level,
        report: result.report
      });

      saveState();
      renderSummaryPreview();
      els.resultCard.style.display = "block";
      els.resultText.textContent = result.report;
      els.resultCard.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    els.nextBtn.addEventListener("click", () => {
      const q = QUESTIONS[state.currentQuestionIndex];
      const value = els.answerInput.value.trim();

      if (!value) {
        showError("Поле не должно быть пустым.");
        return;
      }

      if (q.key === "energy") {
        const num = parseEnergy(value);
        if (num === null || num < 1 || num > 10) {
          showError("Энергия должна быть числом от 1 до 10.");
          return;
        }
      }

      state.answers[q.key] = value;
      saveState();

      if (state.currentQuestionIndex < QUESTIONS.length - 1) {
        state.currentQuestionIndex += 1;
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }

      finalizeFlow();
    });

    els.backBtn.addEventListener("click", () => {
      if (state.currentQuestionIndex === 0) return;

      const q = QUESTIONS[state.currentQuestionIndex];
      state.answers[q.key] = els.answerInput.value.trim();
      state.currentQuestionIndex -= 1;
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    els.resetBtn.addEventListener("click", () => {
      const ok = confirm("Очистить все ответы и начать заново?");
      if (!ok) return;

      state = getDefaultState();
      localStorage.removeItem(STORAGE_KEY);
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    els.copyBtn.addEventListener("click", async () => {
      const text = els.resultText.textContent.trim();
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
        els.copyBtn.textContent = "Скопировано";
        setTimeout(() => {
          els.copyBtn.textContent = "Скопировать";
        }, 1500);
      } catch {
        alert("Не удалось скопировать.");
      }
    });

    els.answerInput.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        els.nextBtn.click();
      }
    });

    render();
  </script>
</body>
</html>
