<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#12121a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="План / Факт — простой Kanban для дня" />
  <title>План / Факт</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%232a2a38'/%3E%3Ctext x='96' y='120' font-size='72' text-anchor='middle' fill='%2388c0ff'%3E%E2%9C%93%3C/text%3E%3C/svg%3E" />
  <script>
    (function () {
      var manifest = {
        name: 'План / Факт',
        short_name: 'План/Факт',
        description: 'Простой Kanban: план, факт и очки за день',
        start_url: location.href.split('#')[0],
        scope: new URL('.', location.href).href,
        display: 'standalone',
        orientation: 'portrait-primary',
        background_color: '#12121a',
        theme_color: '#12121a',
        icons: [
          {
            src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%232a2a38'/%3E%3Ctext x='96' y='120' font-size='72' text-anchor='middle' fill='%2388c0ff'%3E%E2%9C%93%3C/text%3E%3C/svg%3E",
            sizes: '192x192',
            type: 'image/svg+xml',
            purpose: 'any maskable',
          },
          {
            src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='96' fill='%232a2a38'/%3E%3Ctext x='256' y='320' font-size='192' text-anchor='middle' fill='%2388c0ff'%3E%E2%9C%93%3C/text%3E%3C/svg%3E",
            sizes: '512x512',
            type: 'image/svg+xml',
            purpose: 'any maskable',
          },
        ],
      };
      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' }));
      document.head.appendChild(link);
    })();
  </script>
  <style>
/* Mobile-first, dark Kanban — touch-friendly */

:root {
  --bg: #12121a;
  --bg-elevated: #1c1c28;
  --bg-card: #252532;
  --border: #34344a;
  --text: #f0f0f5;
  --text-muted: #9898a8;
  --accent: #6eb3ff;
  --accent-dim: #4a8fd9;
  --success: #5ecf8a;
  --danger: #ff6b7a;
  --radius: 16px;
  --radius-sm: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --tap: 48px;
  font-size: clamp(17px, 4.2vw, 19px);
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  height: 100%;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  min-height: 100%;
  height: 100%;
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  overscroll-behavior: none;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 100dvh;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* Top bar */
.top-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 16px 8px;
  background: linear-gradient(180deg, var(--bg-elevated) 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
}

.app-title {
  margin: 0;
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

/* Board horizontal scroll */
.board-wrap {
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.board {
  display: flex;
  gap: 14px;
  height: 100%;
  padding: 12px 16px 8px;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.board::-webkit-scrollbar {
  height: 6px;
}

.board::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

.column {
  flex: 0 0 min(82vw, 320px);
  scroll-snap-align: start;
  display: flex;
  flex-direction: column;
  min-height: 0;
  max-height: 100%;
  background: var(--bg-elevated);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
}

.column-header {
  flex-shrink: 0;
  padding: 14px 16px;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.02em;
  border-bottom: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.03);
}

.column-body {
  flex: 1;
  min-height: 120px;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 10px;
  -webkit-overflow-scrolling: touch;
}

.column-body::-webkit-scrollbar {
  width: 4px;
}

.column-body::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}

.column-count {
  float: right;
  font-weight: 600;
  color: var(--text-muted);
  font-size: 0.9rem;
}

/* Cards */
.card {
  position: relative;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  padding: 14px 12px 52px;
  margin-bottom: 10px;
  touch-action: pan-y;
  transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
}

.card:active {
  transform: scale(0.98);
}

.card.swiping {
  transition: transform 0.08s ease-out;
  z-index: 2;
}

.card-text {
  margin: 0;
  font-size: 1rem;
  line-height: 1.45;
  word-break: break-word;
}

.card-actions {
  position: absolute;
  left: 8px;
  right: 8px;
  bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}

.btn-icon {
  min-width: var(--tap);
  min-height: 44px;
  padding: 0 14px;
  border: none;
  border-radius: 10px;
  font-size: 1.35rem;
  font-weight: 700;
  line-height: 1;
  background: rgba(110, 179, 255, 0.15);
  color: var(--accent);
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease;
}

.btn-icon:active {
  transform: scale(0.95);
  background: rgba(110, 179, 255, 0.28);
}

.hint-swipe {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-align: center;
  flex: 1;
  user-select: none;
}

.empty-hint {
  padding: 24px 12px;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.95rem;
  line-height: 1.4;
}

/* Composer (fixed bottom) */
.composer {
  flex-shrink: 0;
  display: flex;
  align-items: stretch;
  gap: 10px;
  padding: 12px 16px;
  padding-bottom: max(12px, var(--safe-bottom));
  background: var(--bg-elevated);
  border-top: 1px solid var(--border);
  box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.35);
}

.btn-plus {
  flex-shrink: 0;
  width: 56px;
  min-height: 52px;
  border: none;
  border-radius: 14px;
  font-size: 2rem;
  font-weight: 300;
  line-height: 1;
  background: linear-gradient(145deg, var(--accent) 0%, var(--accent-dim) 100%);
  color: #0a0a10;
  cursor: pointer;
  transition: transform 0.12s ease, filter 0.12s ease;
  box-shadow: 0 4px 14px rgba(110, 179, 255, 0.35);
}

.btn-plus:active {
  transform: scale(0.96);
  filter: brightness(1.08);
}

.task-input {
  flex: 1;
  min-height: 52px;
  padding: 0 18px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--bg-card);
  color: var(--text);
  font-size: 1.05rem;
}

.task-input::placeholder {
  color: var(--text-muted);
}

.task-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(110, 179, 255, 0.2);
}

/* Buttons */
.btn {
  min-height: var(--tap);
  padding: 0 18px;
  border: none;
  border-radius: 14px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s ease, opacity 0.15s ease;
}

.btn:active {
  transform: scale(0.98);
}

.btn-day {
  background: rgba(94, 207, 138, 0.2);
  color: var(--success);
  white-space: nowrap;
  padding: 0 16px;
}

.btn-day:active {
  background: rgba(94, 207, 138, 0.35);
}

.btn-primary {
  background: linear-gradient(145deg, var(--accent) 0%, var(--accent-dim) 100%);
  color: #0a0a10;
}

.btn-block {
  width: 100%;
  margin-top: 8px;
}

/* Modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(4px);
  z-index: 100;
  opacity: 0;
  transition: opacity 0.25s ease;
  pointer-events: none;
}

.modal-backdrop:not(.hidden) {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -48%) scale(0.94);
  z-index: 101;
  width: min(calc(100% - 32px), 400px);
  max-height: min(85dvh, 520px);
  overflow: auto;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
  opacity: 0;
  transition: opacity 0.25s ease, transform 0.28s cubic-bezier(0.34, 1.2, 0.64, 1);
  pointer-events: none;
}

.modal:not(.hidden) {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: auto;
}

.modal-inner {
  padding: 24px 22px 22px;
}

.modal-title {
  margin: 0 0 6px;
  font-size: 1.35rem;
}

.modal-date {
  margin: 0 0 18px;
  color: var(--text-muted);
  font-size: 1rem;
}

.modal-stats {
  list-style: none;
  margin: 0;
  padding: 0;
  font-size: 1.15rem;
  line-height: 1.9;
}

.modal-stats strong {
  color: var(--accent);
  font-size: 1.2rem;
}

.modal-score {
  margin: 20px 0 8px;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--success);
}

.modal-score.negative {
  color: var(--danger);
}

.hidden {
  display: none !important;
}

@media (min-width: 600px) {
  .column {
    flex-basis: 300px;
  }
}
  </style>
</head>
<body>
  <div id="app" class="app">
    <header class="top-bar" role="banner">
      <h1 class="app-title">План / Факт</h1>
      <button type="button" class="btn btn-day" id="btn-end-day" aria-label="Завершить день">
        Завершить день
      </button>
    </header>

    <main class="board-wrap" id="board-wrap" aria-label="Доска задач">
      <div class="board" id="board"></div>
    </main>

    <footer class="composer" role="contentinfo">
      <button type="button" class="btn btn-plus" id="btn-add" aria-label="Добавить задачу">+</button>
      <input
        type="text"
        id="task-input"
        class="task-input"
        placeholder="Новая задача в «План»…"
        autocomplete="off"
        enterkeyhint="done"
        maxlength="500"
      />
    </footer>
  </div>

  <div class="modal-backdrop hidden" id="modal-backdrop" aria-hidden="true"></div>
  <div class="modal hidden" id="modal-result" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-inner">
      <h2 id="modal-title" class="modal-title">➡️ Факт</h2>
      <p class="modal-date" id="modal-date"></p>
      <ul class="modal-stats">
        <li>Сделано: <strong id="stat-done">0</strong></li>
        <li>Не сделано: <strong id="stat-undone">0</strong></li>
      </ul>
      <p class="modal-score" id="modal-score"></p>
      <button type="button" class="btn btn-primary btn-block" id="modal-close">Понятно</button>
    </div>
  </div>

  <script>
(function () {
  'use strict';

  // ——————————————————————————————————————————————————————————————
  // DATA (localStorage)
  // ——————————————————————————————————————————————————————————————

  var STORAGE_KEY = 'plan-fact-tasks-v1';

  function loadTasks() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var data = JSON.parse(raw);
      if (!Array.isArray(data)) return [];
      return data.filter(isValidTask);
    } catch (e) {
      return [];
    }
  }

  function isValidTask(t) {
    if (!t || typeof t !== 'object') return false;
    var statuses = ['plan', 'progress', 'today', 'done'];
    return (
      typeof t.id === 'string' &&
      typeof t.text === 'string' &&
      typeof t.createdAt === 'string' &&
      statuses.indexOf(t.status) !== -1
    );
  }

  function saveTasks(tasks) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    } catch (e) {
      console.error('saveTasks', e);
    }
  }

  // ——————————————————————————————————————————————————————————————
  // SERVICES (логика)
  // ——————————————————————————————————————————————————————————————

  var STATUS_ORDER = ['plan', 'progress', 'today', 'done'];

  var COLUMN_LABELS = {
    plan: 'План',
    progress: 'В процессе',
    today: 'Сегодня',
    done: 'Готово',
  };

  function nextStatus(s) {
    var i = STATUS_ORDER.indexOf(s);
    if (i < 0 || i >= STATUS_ORDER.length - 1) return s;
    return STATUS_ORDER[i + 1];
  }

  function prevStatus(s) {
    var i = STATUS_ORDER.indexOf(s);
    if (i <= 0) return s;
    return STATUS_ORDER[i - 1];
  }

  function endOfDayCounts(tasks) {
    var done = 0;
    var undone = 0;
    for (var i = 0; i < tasks.length; i++) {
      if (tasks[i].status === 'done') done += 1;
      else undone += 1;
    }
    return { done: done, undone: undone };
  }

  function dayPoints(done, undone) {
    return done * 5 - undone * 5;
  }

  function newId() {
    return String(Date.now()) + '-' + Math.random().toString(36).slice(2, 11);
  }

  // ——————————————————————————————————————————————————————————————
  // STATE
  // ——————————————————————————————————————————————————————————————

  var tasks = loadTasks();

  // ——————————————————————————————————————————————————————————————
  // UI — render
  // ——————————————————————————————————————————————————————————————

  var boardEl = document.getElementById('board');
  var taskInput = document.getElementById('task-input');
  var btnAdd = document.getElementById('btn-add');
  var btnEndDay = document.getElementById('btn-end-day');
  var modalBackdrop = document.getElementById('modal-backdrop');
  var modalResult = document.getElementById('modal-result');
  var modalDate = document.getElementById('modal-date');
  var statDone = document.getElementById('stat-done');
  var statUndone = document.getElementById('stat-undone');
  var modalScore = document.getElementById('modal-score');
  var modalClose = document.getElementById('modal-close');

  function tasksInColumn(status) {
    return tasks.filter(function (t) {
      return t.status === status;
    });
  }

  function renderBoard() {
    if (!boardEl) return;
    boardEl.innerHTML = '';

    for (var si = 0; si < STATUS_ORDER.length; si++) {
      var status = STATUS_ORDER[si];
      var col = document.createElement('section');
      col.className = 'column';
      col.dataset.status = status;

      var list = tasksInColumn(status);

      var header = document.createElement('div');
      header.className = 'column-header';
      header.innerHTML = COLUMN_LABELS[status] + ' <span class="column-count">' + list.length + '</span>';

      var body = document.createElement('div');
      body.className = 'column-body';

      if (list.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'empty-hint';
        empty.textContent = 'Пока пусто — добавьте задачу снизу';
        body.appendChild(empty);
      } else {
        for (var ti = 0; ti < list.length; ti++) {
          body.appendChild(createCard(list[ti]));
        }
      }

      col.appendChild(header);
      col.appendChild(body);
      boardEl.appendChild(col);
    }
  }

  function createCard(task) {
    var card = document.createElement('article');
    card.className = 'card';
    card.dataset.id = task.id;

    var p = document.createElement('p');
    p.className = 'card-text';
    p.textContent = task.text;

    var actions = document.createElement('div');
    actions.className = 'card-actions';

    var prev = document.createElement('button');
    prev.type = 'button';
    prev.className = 'btn-icon';
    prev.setAttribute('aria-label', 'Предыдущий статус');
    prev.textContent = '←';

    var hint = document.createElement('span');
    hint.className = 'hint-swipe';
    hint.textContent = 'свайп ← →';

    var next = document.createElement('button');
    next.type = 'button';
    next.className = 'btn-icon';
    next.setAttribute('aria-label', 'Следующий статус');
    next.textContent = '→';

    prev.addEventListener('click', function (e) {
      e.stopPropagation();
      moveTask(task.id, -1);
    });
    next.addEventListener('click', function (e) {
      e.stopPropagation();
      moveTask(task.id, 1);
    });

    actions.appendChild(prev);
    actions.appendChild(hint);
    actions.appendChild(next);

    card.appendChild(p);
    card.appendChild(actions);

    attachSwipe(card, task.id);
    return card;
  }

  function attachSwipe(cardEl, taskId) {
    var startX = 0;
    var startY = 0;
    var tracking = false;

    var TH = 56;

    function onStart(clientX, clientY) {
      startX = clientX;
      startY = clientY;
      tracking = true;
    }

    function onMove(clientX, clientY) {
      if (!tracking) return;
      var dx = clientX - startX;
      var dy = clientY - startY;
      if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 12) {
        tracking = false;
        cardEl.style.transform = '';
        cardEl.classList.remove('swiping');
        return;
      }
      var clamped = Math.max(-48, Math.min(48, dx * 0.35));
      cardEl.style.transform = 'translateX(' + clamped + 'px)';
      cardEl.classList.add('swiping');
    }

    function onEnd(clientX) {
      if (!tracking) return;
      tracking = false;
      var dx = clientX - startX;
      cardEl.style.transform = '';
      cardEl.classList.remove('swiping');

      if (dx > TH) moveTask(taskId, 1);
      else if (dx < -TH) moveTask(taskId, -1);
    }

    cardEl.addEventListener(
      'touchstart',
      function (e) {
        var t = e.touches[0];
        if (t) onStart(t.clientX, t.clientY);
      },
      { passive: true }
    );

    cardEl.addEventListener(
      'touchmove',
      function (e) {
        var t = e.touches[0];
        if (!t) return;
        var dx = t.clientX - startX;
        var dy = t.clientY - startY;
        if (tracking && Math.abs(dx) > Math.abs(dy) + 8) {
          e.preventDefault();
        }
        onMove(t.clientX, t.clientY);
      },
      { passive: false }
    );

    cardEl.addEventListener('touchend', function (e) {
      var t = e.changedTouches[0];
      onEnd(t.clientX);
    });

    cardEl.addEventListener('touchcancel', function () {
      tracking = false;
      cardEl.style.transform = '';
      cardEl.classList.remove('swiping');
    });

    var mouseDown = false;
    cardEl.addEventListener('mousedown', function (e) {
      if (e.button !== 0) return;
      mouseDown = true;
      onStart(e.clientX, e.clientY);
    });
    window.addEventListener(
      'mousemove',
      function (e) {
        if (!mouseDown) return;
        onMove(e.clientX, e.clientY);
      },
      { passive: true }
    );
    window.addEventListener('mouseup', function (e) {
      if (!mouseDown) return;
      mouseDown = false;
      onEnd(e.clientX);
    });
  }

  function moveTask(id, dir) {
    var task = null;
    for (var i = 0; i < tasks.length; i++) {
      if (tasks[i].id === id) {
        task = tasks[i];
        break;
      }
    }
    if (!task) return;
    var next = dir === 1 ? nextStatus(task.status) : prevStatus(task.status);
    if (next === task.status) return;
    task.status = next;
    persist();
  }

  function persist() {
    saveTasks(tasks);
    renderBoard();
  }

  function addTask() {
    var text = (taskInput && taskInput.value.trim()) || '';
    if (!text) return;
    tasks.push({
      id: newId(),
      text: text,
      status: 'plan',
      createdAt: new Date().toISOString(),
    });
    if (taskInput) taskInput.value = '';
    persist();
  }

  function openResultModal() {
    var counts = endOfDayCounts(tasks);
    var done = counts.done;
    var undone = counts.undone;
    var z = dayPoints(done, undone);

    var now = new Date();
    var dateStr = now.toLocaleDateString('ru-RU', {
      weekday: 'long',
      day: 'numeric',
      month: 'long',
      year: 'numeric',
    });

    if (modalDate) modalDate.textContent = dateStr;
    if (statDone) statDone.textContent = String(done);
    if (statUndone) statUndone.textContent = String(undone);
    if (modalScore) {
      modalScore.textContent = '🏆 Очки за день: ' + (z >= 0 ? '+' : '') + z;
      modalScore.classList.toggle('negative', z < 0);
    }

    var titleEl = document.getElementById('modal-title');
    if (titleEl) titleEl.textContent = '➡️ Факт';

    if (modalBackdrop) {
      modalBackdrop.classList.remove('hidden');
      modalBackdrop.setAttribute('aria-hidden', 'false');
    }
    if (modalResult) {
      modalResult.classList.remove('hidden');
    }
  }

  function closeModal() {
    if (modalBackdrop) {
      modalBackdrop.classList.add('hidden');
      modalBackdrop.setAttribute('aria-hidden', 'true');
    }
    if (modalResult) modalResult.classList.add('hidden');
  }

  /** PWA: service worker из строки — кэширует эту страницу для офлайна */
  function registerSW() {
    if (!('serviceWorker' in navigator)) return;
    var swCode = [
      "const CACHE_NAME='plan-fact-v1-single';",
      "self.addEventListener('install',function(e){e.waitUntil(self.skipWaiting());});",
      "self.addEventListener('activate',function(e){e.waitUntil(caches.keys().then(function(keys){return Promise.all(keys.filter(function(k){return k!==CACHE_NAME;}).map(function(k){return caches.delete(k);}));}).then(function(){return self.clients.claim();}));});",
      "self.addEventListener('fetch',function(e){var r=e.request;if(r.method!=='GET')return;e.respondWith(caches.open(CACHE_NAME).then(function(cache){return fetch(r).then(function(res){if(res.ok)cache.put(r,res.clone());return res;}).catch(function(){return cache.match(r);});}));});",
    ].join('');
    try {
      var blob = new Blob([swCode], { type: 'application/javascript' });
      var swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(function () {});
    } catch (e) {}
  }

  function init() {
    renderBoard();

    if (btnAdd) btnAdd.addEventListener('click', addTask);
    if (taskInput) {
      taskInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          addTask();
        }
      });
    }

    if (btnEndDay) btnEndDay.addEventListener('click', openResultModal);
    if (modalClose) modalClose.addEventListener('click', closeModal);
    if (modalBackdrop) modalBackdrop.addEventListener('click', closeModal);

    registerSW();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
  </script>
</body>
</html>
